<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Tracker — jylee.co</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3a;
            --text: #e4e4ef;
            --text-dim: #8888a0;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --green: #00d68f;
            --red: #ff6b6b;
            --yellow: #ffd93d;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.9);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .logo-text span { color: var(--text-dim); font-weight: 400; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-badge.active {
            background: rgba(0, 214, 143, 0.1);
            color: var(--green);
            border: 1px solid rgba(0, 214, 143, 0.2);
        }

        .status-badge.inactive {
            background: rgba(136, 136, 160, 0.1);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-badge.active .status-dot {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Main layout */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Search / Topic Input */
        .search-section {
            margin-bottom: 32px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }

        .search-input {
            flex: 1;
            padding: 14px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-input::placeholder { color: var(--text-dim); }

        .btn {
            padding: 14px 28px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #5b4bd5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: rgba(255, 107, 107, 0.1);
            color: var(--red);
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .btn-danger:hover {
            background: rgba(255, 107, 107, 0.2);
        }

        /* Info bar */
        .info-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .info-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
        }

        .info-card label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .info-card .value {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Tables */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 32px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background: rgba(108, 92, 231, 0.03); }

        .price {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .change-up { color: var(--green); }
        .change-down { color: var(--red); }
        .change-flat { color: var(--text-dim); }

        /* Alerts section */
        .alert-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            margin-bottom: 12px;
            border-left: 3px solid var(--accent);
        }

        .alert-item.up { border-left-color: var(--green); }
        .alert-item.down { border-left-color: var(--red); }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .alert-title {
            font-weight: 600;
            font-size: 14px;
        }

        .alert-time {
            font-size: 12px;
            color: var(--text-dim);
        }

        .alert-change {
            font-size: 13px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .alert-analysis {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 15px;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Settings panel */
        .settings-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .setting-field {
            flex: 1;
            min-width: 160px;
        }

        .setting-field label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .setting-field input {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .setting-field input:focus {
            border-color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container { padding: 16px; }
            .header { padding: 14px 16px; }
            .search-box { flex-direction: column; }
            .btn { width: 100%; text-align: center; }
            .info-bar { grid-template-columns: 1fr 1fr; }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">
    <div class="logo">
        <div class="logo-icon">📊</div>
        <div class="logo-text">Prediction Tracker <span>by jylee.co</span></div>
    </div>
    <div id="statusBadge" class="status-badge inactive">
        <div class="status-dot"></div>
        <span id="statusText">Inactive</span>
    </div>
</div>

<div class="container">

    <!-- Search -->
    <div class="search-section">
        <div class="search-box">
            <input
                type="text"
                id="topicInput"
                class="search-input"
                placeholder="Enter a topic to track (e.g., Iran war, recession, bitcoin)..."
                autofocus
            >
            <button id="trackBtn" class="btn btn-primary" onclick="startTracking()">
                Start Tracking
            </button>
            <button id="stopBtn" class="btn btn-danger" onclick="stopTracking()" style="display:none;">
                Stop
            </button>
        </div>
    </div>

    <!-- Stats -->
    <div class="info-bar" id="infoBar" style="display:none;">
        <div class="info-card">
            <label>Topic</label>
            <div class="value" id="currentTopic">—</div>
        </div>
        <div class="info-card">
            <label>Markets</label>
            <div class="value" id="marketCount">0</div>
        </div>
        <div class="info-card">
            <label>Alerts Sent</label>
            <div class="value" id="alertCount">0</div>
        </div>
        <div class="info-card">
            <label>Threshold</label>
            <div class="value" id="threshold">10%</div>
        </div>
    </div>

    <!-- Markets table -->
    <div id="marketsSection" style="display:none;">
        <div class="section-title">📈 Tracked Markets</div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Market</th>
                        <th>Baseline</th>
                        <th>Current</th>
                        <th>Change</th>
                        <th>Volume</th>
                    </tr>
                </thead>
                <tbody id="marketsBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Alerts -->
    <div id="alertsSection" style="display:none;">
        <div class="section-title">🔔 Recent Alerts</div>
        <div id="alertsList"></div>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state">
        <div class="icon">🔍</div>
        <p>Enter a topic above to start monitoring Kalshi prediction markets. You'll get Telegram alerts when prices move more than 10%.</p>
    </div>

</div>

<script>
    const API = window.location.origin;
    let pollTimer = null;

    // Topic input: enter to submit
    document.getElementById('topicInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') startTracking();
    });

    async function startTracking() {
        const topic = document.getElementById('topicInput').value.trim();
        if (!topic) return;

        const btn = document.getElementById('trackBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Starting...';

        try {
            const resp = await fetch(`${API}/api/track`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic }),
            });

            if (!resp.ok) throw new Error('Failed to start tracking');

            document.getElementById('stopBtn').style.display = '';
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('infoBar').style.display = '';
            document.getElementById('marketsSection').style.display = '';
            document.getElementById('alertsSection').style.display = '';

            setStatus(true, topic);
            startPolling();
        } catch (err) {
            alert('Error: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Start Tracking';
        }
    }

    async function stopTracking() {
        try {
            await fetch(`${API}/api/stop`, { method: 'POST' });
        } catch {}
        setStatus(false);
        stopPolling();
        document.getElementById('stopBtn').style.display = 'none';
    }

    function setStatus(active, topic) {
        const badge = document.getElementById('statusBadge');
        const text = document.getElementById('statusText');
        if (active) {
            badge.className = 'status-badge active';
            text.textContent = `Tracking: ${topic}`;
        } else {
            badge.className = 'status-badge inactive';
            text.textContent = 'Inactive';
        }
    }

    function startPolling() {
        stopPolling();
        fetchStatus();
        pollTimer = setInterval(fetchStatus, 5000);
    }

    function stopPolling() {
        if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
        }
    }

    async function fetchStatus() {
        try {
            const resp = await fetch(`${API}/api/status`);
            const data = await resp.json();
            updateDashboard(data);
        } catch {}
    }

    function updateDashboard(data) {
        // Update info cards
        document.getElementById('currentTopic').textContent = data.topic || '—';
        document.getElementById('marketCount').textContent = data.market_count || 0;
        document.getElementById('alertCount').textContent = (data.recent_alerts || []).length;
        document.getElementById('threshold').textContent =
            `${(data.threshold * 100).toFixed(0)}%`;

        if (data.is_running) {
            setStatus(true, data.topic);
            document.getElementById('stopBtn').style.display = '';
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('infoBar').style.display = '';
            document.getElementById('marketsSection').style.display = '';
            document.getElementById('alertsSection').style.display = '';
        }

        // Update markets table
        const tbody = document.getElementById('marketsBody');
        if (data.markets && data.markets.length > 0) {
            tbody.innerHTML = data.markets.map(m => {
                const baseline = m.baseline_price;
                const current = m.current_price ?? baseline;
                const change = current - baseline;
                const changeClass = change > 0.001 ? 'change-up' :
                                    change < -0.001 ? 'change-down' : 'change-flat';
                const changeSign = change > 0 ? '+' : '';
                return `<tr>
                    <td>${escHtml(m.title)}</td>
                    <td class="price">${(baseline * 100).toFixed(1)}¢</td>
                    <td class="price">${(current * 100).toFixed(1)}¢</td>
                    <td class="price ${changeClass}">${changeSign}${(change * 100).toFixed(1)}¢</td>
                    <td>$${Number(m.volume).toLocaleString()}</td>
                </tr>`;
            }).join('');
        } else {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:30px;">No markets found yet. The tracker is searching...</td></tr>';
        }

        // Update alerts
        const alertsList = document.getElementById('alertsList');
        const alerts = data.recent_alerts || [];
        if (alerts.length > 0) {
            alertsList.innerHTML = alerts.slice().reverse().map(a => {
                const dir = a.direction === 'UP' ? 'up' : 'down';
                const emoji = dir === 'up' ? '📈' : '📉';
                const time = new Date(a.timestamp).toLocaleString();
                return `<div class="alert-item ${dir}">
                    <div class="alert-header">
                        <div class="alert-title">${emoji} ${escHtml(a.title)}</div>
                        <div class="alert-time">${time}</div>
                    </div>
                    <div class="alert-change ${dir === 'up' ? 'change-up' : 'change-down'}">
                        ${(a.old_price * 100).toFixed(1)}¢ → ${(a.new_price * 100).toFixed(1)}¢
                        (${a.direction} ${(Math.abs(a.new_price - a.old_price) * 100).toFixed(1)}¢)
                    </div>
                    <div class="alert-analysis">${escHtml(a.analysis)}</div>
                </div>`;
            }).join('');
        } else {
            alertsList.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:30px;">No alerts yet. You\'ll see them here and on Telegram when markets move.</div>';
        }
    }

    function escHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Check status on load (in case tracker is already running)
    fetchStatus().then(() => {});
</script>
</body>
</html>
